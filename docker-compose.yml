version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: createai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/tmp/createai
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/createai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/createai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - APIFY_TOKEN=${APIFY_TOKEN:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN:-}
      - META_IG_USER_ID=${META_IG_USER_ID:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID:-}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET:-}
      - YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN:-}
      - UPLOAD_POST_API_KEY=${UPLOAD_POST_API_KEY:-}
      - WHISPER_MODEL=base
      - MAX_SCRAPE_PER_PLATFORM=50
      - TEMP_DIR=/tmp/createai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.scheduler.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - media_data:/tmp/createai
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/createai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/createai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - APIFY_TOKEN=${APIFY_TOKEN:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN:-}
      - META_IG_USER_ID=${META_IG_USER_ID:-}
      - YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID:-}
      - YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET:-}
      - YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN:-}
      - UPLOAD_POST_API_KEY=${UPLOAD_POST_API_KEY:-}
      - WHISPER_MODEL=base
      - MAX_SCRAPE_PER_PLATFORM=50
      - TEMP_DIR=/tmp/createai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.scheduler.beat.beat_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/createai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/createai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
